<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
    margin:0;
    font-family:'Segoe UI';
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container {
    background: rgba(255,255,255,0.05);
    padding:30px;
    border-radius:20px;
    text-align:center;
}
input, button {
    width:90%;
    padding:10px;
    margin:10px;
    border-radius:10px;
}
button {
    background:#00ffcc;
}
</style>
</head>
<body>

<div class="container">
<h2>🔐 Login</h2>

{% with messages = get_flashed_messages() %}
{% if messages %}
<p>{{ messages[0] }}</p>
{% endif %}
{% endwith %}

<form method="POST">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button>Login</button>
</form>

<p><a href="/signup">Create Account</a></p>
</div>

</body>
</html>
