<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding:30px;
    border-radius:20px;
    width:320px;
    text-align:center;
    box-shadow: 0 0 30px rgba(0,255,200,0.3);
}

/* INPUTS */
input {
    width:90%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    outline:none;
    background:#111;
    color:white;
    border:1px solid #00ffcc;
}

input:focus {
    box-shadow:0 0 10px #00ffcc;
}

/* BUTTON */
button {
    width:95%;
    padding:12px;
    border:none;
    border-radius:10px;
    background: linear-gradient(45deg,#00adb5,#00ffcc);
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

button:hover {
    transform:scale(1.05);
}

/* TEXT */
a {
    color:#00ffcc;
    text-decoration:none;
}

h2 {
    text-shadow:0 0 10px #00ffcc;
}
</style>

</head>

<body>

<div class="container">
<h2>🔐 Login</h2>

<form method="POST">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button>Login</button>
</form>

<p>Don't have an account? <a href="/signup">Signup</a></p>
</div>

</body>
</html>
