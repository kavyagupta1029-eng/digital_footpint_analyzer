<!DOCTYPE html>
<html>
<head>
<title>Digital Footprint Analyzer</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

/* FORM */
.container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    padding:25px;
    border-radius:20px;
    width:320px;
    margin:30px auto;
    box-shadow: 0 0 25px rgba(0,255,200,0.2);
}

input, button {
    width:90%;
    padding:12px;
    margin:10px;
    border-radius:10px;
    border:none;
}

button {
    background: linear-gradient(45deg,#00adb5,#00ffcc);
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* RESULT CARD */
.card {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    border-radius:20px;
    padding:25px;
    width:70%;
    margin:30px auto;
    text-align:left;
    box-shadow: 0 0 30px rgba(0,255,200,0.3);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1;}
}

pre {
    white-space: pre-wrap;
    font-size:14px;
}

/* CHATBOX */
.chatbox {
    width:70%;
    margin:30px auto;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    padding:20px;
    border-radius:20px;
    box-shadow: 0 0 25px rgba(0,255,200,0.2);
}

.chat-area {
    height:250px;
    overflow-y:auto;
    padding:10px;
    border-radius:10px;
    background:#0a0a0a;
}

/* CHAT BUBBLES */
.user {
    text-align:right;
    margin:10px;
}

.user span {
    background:#00adb5;
    padding:8px 12px;
    border-radius:15px;
    display:inline-block;
}

.bot {
    text-align:left;
    margin:10px;
}

.bot span {
    background:#333;
    padding:8px 12px;
    border-radius:15px;
    display:inline-block;
}

/* SCROLLBAR */
.chat-area::-webkit-scrollbar {
    width:6px;
}
.chat-area::-webkit-scrollbar-thumb {
    background:#00ffcc;
    border-radius:10px;
}
</style>

<script>
function typeEffect(text, element){
    let i=0;
    element.innerHTML="";
    function typing(){
        if(i<text.length){
            element.innerHTML+=text.charAt(i);
            i++;
            setTimeout(typing,15);
        }
    }
    typing();
}

function sendMessage(){
    let input=document.getElementById("userInput");
    let chat=document.getElementById("chat");

    let msg=input.value.trim();
    if(!msg) return;

    chat.innerHTML+=`<div class="user"><span>${msg}</span></div>`;

    let res="Ask about privacy, risk or footprint.";

    let lower=msg.toLowerCase();

    if(lower.includes("privacy"))
        res="Limit visibility and remove personal info.";
    else if(lower.includes("risk"))
        res="Reduce exposure on social platforms.";
    else if(lower.includes("footprint"))
        res="Digital footprint is your online presence.";
    else if(lower.includes("improve"))
        res="Update settings, delete old data and avoid oversharing.";

    setTimeout(()=>{
        chat.innerHTML+=`<div class="bot"><span>${res}</span></div>`;
        chat.scrollTop=chat.scrollHeight;
    },500);

    input.value="";
}
</script>
</head>

<body>

<h1>🔍 Digital Footprint Analyzer</h1>
<p>Analyze how much of your data is visible online</p>

<div class="container">
<form method="POST">
<input name="name" placeholder="Enter Name" required>
<input name="city" placeholder="Enter City" required>
<input name="college" placeholder="Enter College" required>
<button>Analyze</button>
</form>
</div>

{% if result %}
<div class="card">
<h2>📊 Analysis Result</h2>

<pre id="output" style="display:none;">{{ result }}</pre>
<pre id="typed"></pre>

<script>
typeEffect(
    document.getElementById("output").innerText,
    document.getElementById("typed")
);
</script>
</div>

<div class="chatbox">
<h3>🤖 AI Assistant</h3>

<div id="chat" class="chat-area"></div>

<input id="userInput" placeholder="Ask something...">
<button onclick="sendMessage()">Send</button>
</div>
{% endif %}

</body>
</html>
