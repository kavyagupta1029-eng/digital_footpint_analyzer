<!DOCTYPE html>
<html>
<head>
<title>Digital Footprint Analyzer</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
    margin:0;
}

h1 {
    font-size:32px;
    text-shadow: 0 0 15px #00ffcc;
}

.container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    padding:25px;
    border-radius:20px;
    width:320px;
    margin:30px auto;
    box-shadow: 0 0 25px rgba(0,255,200,0.2);
}

input {
    width:90%;
    padding:12px;
    margin:10px;
    border-radius:10px;
    border:none;
    outline:none;
    background:#111;
    color:white;
    border:1px solid #00ffcc;
}

input:focus {
    box-shadow:0 0 10px #00ffcc;
}

button {
    width:90%;
    padding:12px;
    margin:10px;
    border-radius:10px;
    border:none;
    background: linear-gradient(45deg,#00adb5,#00ffcc);
    font-weight:bold;
    cursor:pointer;
}

button:hover {
    transform: scale(1.05);
}

#loader {
    display:none;
    margin-top:20px;
}

.spinner {
    border: 5px solid rgba(255,255,255,0.1);
    border-top: 5px solid #00ffcc;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin:auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.card {
    background: rgba(0,0,0,0.6);
    border-radius:20px;
    padding:25px;
    width:70%;
    margin:30px auto;
    text-align:left;
    box-shadow: 0 0 30px rgba(0,255,200,0.3);
    animation: fadeSlide 0.8s forwards;
}

@keyframes fadeSlide {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}

pre {
    white-space: pre-wrap;
}

.chatbox {
    width:70%;
    margin:30px auto;
    background: rgba(0,0,0,0.6);
    padding:20px;
    border-radius:20px;
}

.chat-area {
    height:250px;
    overflow-y:auto;
    background:#0a0a0a;
    padding:10px;
}

.user { text-align:right; margin:10px; }
.user span {
    background:#00ffcc;
    color:black;
    padding:8px;
    border-radius:10px;
}

.bot { text-align:left; margin:10px; }
.bot span {
    background:#222;
    padding:8px;
    border-radius:10px;
}

@media(max-width:600px){
    .container,.card,.chatbox{width:90%;}
}
</style>

<script>
function typeEffect(text, element){
    let i=0;
    element.innerHTML="";
    function typing(){
        if(i<text.length){
            element.innerHTML+=text.charAt(i);
            i++;
            setTimeout(typing,15);
        }
    }
    typing();
}

function sendMessage(){
    let input=document.getElementById("userInput");
    let chat=document.getElementById("chat");

    let msg=input.value.trim();
    if(!msg) return;

    chat.innerHTML+=`<div class="user"><span>${msg}</span></div>`;

    let res="Ask about privacy, risk or footprint.";
    let lower=msg.toLowerCase();

    if(lower.includes("privacy"))
        res="Limit visibility and remove personal info.";
    else if(lower.includes("risk"))
        res="Reduce exposure on social platforms.";
    else if(lower.includes("footprint"))
        res="Digital footprint is your online presence.";

    setTimeout(()=>{
        chat.innerHTML+=`<div class="bot"><span>${res}</span></div>`;
        chat.scrollTop=chat.scrollHeight;
    },500);

    input.value="";
}
</script>
</head>

<body>

<h1>🔍 Digital Footprint Analyzer</h1>

<div class="container">
<form method="POST">
<input name="name" placeholder="Enter Name" required>
<input name="city" placeholder="Enter City" required>
<input name="college" placeholder="Enter College" required>
<button>Analyze</button>
</form>
</div>

<div id="loader">
    <div class="spinner"></div>
    <p>Analyzing...</p>
</div>

{% if result %}
<div class="card">
<h2>📊 Result</h2>

<pre id="output" style="display:none;">{{ result }}</pre>
<pre id="typed"></pre>

<script>
typeEffect(
document.getElementById("output").innerText,
document.getElementById("typed")
);
</script>
</div>

<div class="chatbox">
<h3>🤖 AI Assistant</h3>
<div id="chat" class="chat-area"></div>
<input id="userInput">
<button onclick="sendMessage()">Send</button>
</div>
{% endif %}

<script>
document.querySelector("form").addEventListener("submit", function(){
document.getElementById("loader").style.display="block";
});
</script>

</body>
</html>
